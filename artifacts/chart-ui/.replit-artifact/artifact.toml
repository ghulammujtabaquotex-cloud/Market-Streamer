kind = "web"
previewPath = "/"
title = "TradoWix Chart"
version = "1.0.0"
id = "artifacts/chart-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20260

[services.development]
run = "pnpm --filter @workspace/chart-ui run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chart-ui", "run", "build" ]
publicDir = "artifacts/chart-ui/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20260"
BASE_PATH = "/"
